{% extends 'admin/layout_admin.html' %}

{% block title %}
    <title>Répondre à un commentaire</title>
{% endblock %}

{% block body %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4>Répondre au commentaire</h4>
                </div>
                <div class="card-body">
                    <form action="/admin/article/commentaires/repondre" method="POST">
                        <input type="hidden" name="id_commentaire" value="{{ id_commentaire }}">
                        <input type="hidden" name="id_article" value="{{ id_article }}">

                        <div class="form-group mb-3">
                            <label for="reponse">Votre réponse :</label>
                            <textarea name="reponse" id="reponse" class="form-control" rows="4" required></textarea>
                        </div>

                        <button type="submit" class="btn btn-success">Publier la réponse</button>
                        <a href="/admin/article/commentaires?id_article={{ id_article }}" class="btn btn-secondary">Annuler</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
